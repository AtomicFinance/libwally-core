name: Build Wheels

on:
  push:
    branches:
    - develop
    - feature/*
  pull_request:
    branches:
    - develop

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2022, self-hosted, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        name: Install Python
        with:
          python-version: '3.10'

      - uses: ilammy/msvc-dev-cmd@v1.13.0
        if: runner.os == 'Windows'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.16.2

      - name: Install Windows Build Deps
        if: runner.os == 'Windows'
        run: choco install swig --version=4.1.1 --no-progress -y

      - name: Generate Windows SWIG Files
        if: runner.os == 'Windows'
        run: .\tools\msvc\swig.bat
        env:
          SWIG_PATH: "C:\\ProgramData\\chocolatey\\lib\\swig\\tools\\install\\swigwin-4.1.1"

      - name: Generate ecmult_static_context.h
        if: runner.os == 'Windows'
        run: .\tools\msvc\gen_ecmult_static_context.bat
        env:
          LIBWALLY_DIR: "."

      - name: Install macOS Build Deps
        if: runner.os == 'macOS'
        run: |
          brew install gnu-sed swig automake autoconf libtool pkg-config

      - name: Install Linux Build Deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y swig python3-dev automake autoconf libtool pkg-config

      - name: Build Wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_SKIP: "cp27-* cp35-* cp36-* cp37-* pp* *-musllinux*"
          # Only build native architecture on macOS to avoid cross-compilation issues
          CIBW_ARCHS_MACOS: "native"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          # Install build dependencies inside the build container
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y epel-release && \
            yum install -y automake autoconf libtool swig3 && \
            ln -sf /usr/bin/swig3.0 /usr/bin/swig || \
            ln -sf /usr/bin/swig3 /usr/bin/swig
          CIBW_BEFORE_ALL_MACOS: "brew install automake autoconf libtool swig || true"
          # Environment variables for the build
          CIBW_ENVIRONMENT: "WALLY_ABI_PY_WHEEL_VERSION=1001"
          # Set architecture-specific flags for macOS
          CIBW_ENVIRONMENT_MACOS: "WALLY_ABI_PY_WHEEL_VERSION=1001 ARCHFLAGS='-arch arm64' _PYTHON_HOST_PLATFORM='macosx-11.0-arm64'"
          # Increase build verbosity
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # Separate job for x86_64 macOS wheels on GitHub-hosted runners
  build_macos_x86_64_wheels:
    name: Build x86_64 wheels on macOS
    runs-on: macos-13  # Last Intel-based macOS runner

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        name: Install Python
        with:
          python-version: '3.10'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.16.2

      - name: Install macOS Build Deps
        run: |
          brew install gnu-sed swig automake autoconf libtool pkg-config

      - name: Build x86_64 Wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_SKIP: "cp27-* cp35-* cp36-* cp37-* pp* *-musllinux*"
          CIBW_ARCHS_MACOS: "x86_64"
          CIBW_BEFORE_ALL_MACOS: "brew install automake autoconf libtool swig || true"
          CIBW_ENVIRONMENT: "WALLY_ABI_PY_WHEEL_VERSION=1001"
          CIBW_ENVIRONMENT_MACOS: "WALLY_ABI_PY_WHEEL_VERSION=1001 ARCHFLAGS='-arch x86_64' _PYTHON_HOST_PLATFORM='macosx-10.9-x86_64'"
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-x86_64
          path: ./wheelhouse/*.whl
