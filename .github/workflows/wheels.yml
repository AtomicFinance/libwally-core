name: Build Wheels

on:
  push:
    branches:
    - develop
    - feature/*
  pull_request:
    branches:
    - develop

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2022, self-hosted, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        if: matrix.os != 'self-hosted'
        name: Install Python
        with:
          python-version: '3.10'

      - name: Setup Python for self-hosted runner
        if: matrix.os == 'self-hosted'
        run: |
          echo "Using system Python"
          python3 --version
          pip3 --version
          # Get Python version for cibuildwheel
          PYTHON_VERSION=$(python3 -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          echo "PYTHON_VERSION=$PYTHON_VERSION" >> $GITHUB_ENV
          echo "Detected Python version: $PYTHON_VERSION"

      - uses: ilammy/msvc-dev-cmd@v1.13.0
        if: runner.os == 'Windows'

      - name: Install cibuildwheel
        run: |
          if [ "${{ matrix.os }}" = "self-hosted" ]; then
            pip3 install cibuildwheel==2.16.2
          else
            python -m pip install cibuildwheel==2.16.2
          fi
        shell: bash

      - name: Install Windows Build Deps
        if: runner.os == 'Windows'
        run: choco install swig --version=4.1.1 --no-progress -y

      - name: Generate Windows SWIG Files
        if: runner.os == 'Windows'
        run: .\tools\msvc\swig.bat
        env:
          SWIG_PATH: "C:\\ProgramData\\chocolatey\\lib\\swig\\tools\\install\\swigwin-4.1.1"

      - name: Generate ecmult_static_context.h
        if: runner.os == 'Windows'
        run: .\tools\msvc\gen_ecmult_static_context.bat
        env:
          LIBWALLY_DIR: "."

      - name: Install macOS Build Deps
        if: runner.os == 'macOS'
        run: |
          brew install gnu-sed swig automake autoconf libtool pkg-config

      - name: Install Linux Build Deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y swig python3-dev automake autoconf libtool pkg-config

      - name: Build Wheels (Self-hosted)
        if: matrix.os == 'self-hosted'
        run: |
          # Build wheel manually on self-hosted runner using CMake to avoid autotools Python detection issues
          echo "Building wheel manually on self-hosted ARM64 runner using CMake"

          # Install required Python packages
          python3 -m pip install wheel setuptools

          # Build using CMake with Python support (which we already fixed for ARM64)
          npm run cmake_clean
          npm run cmake_python

          # Check if SWIG files were generated
          ls -la src/swig_python/
          ls -la build/

          # Create a simple wheel using the built library
          mkdir -p wheelhouse
          cd src/swig_python

          # Check if swig_wrap.c was generated
          if [ ! -f "swig_wrap.c" ]; then
            echo "Error: swig_wrap.c not found. SWIG generation may have failed."
            exit 1
          fi

          # Create a minimal setup.py that uses the pre-built library
          echo "import os" > setup_simple.py
          echo "import sys" >> setup_simple.py
          echo "from setuptools import setup, Extension" >> setup_simple.py
          echo "from distutils.util import get_platform" >> setup_simple.py
          echo "" >> setup_simple.py
          echo "wally_ext = Extension(" >> setup_simple.py
          echo "    '_wallycore'," >> setup_simple.py
          echo "    sources=['swig_wrap.c']," >> setup_simple.py
          echo "    include_dirs=['../../include', '../../src']," >> setup_simple.py
          echo "    library_dirs=['../../build/Release']," >> setup_simple.py
          echo "    libraries=['wallycore']," >> setup_simple.py
          echo "    define_macros=[('SWIG_PYTHON_BUILD', None), ('BUILD_ELEMENTS', None)]," >> setup_simple.py
          echo ")" >> setup_simple.py
          echo "" >> setup_simple.py
          echo "setup(" >> setup_simple.py
          echo "    name='wallycore'," >> setup_simple.py
          echo "    version='0.8.3'," >> setup_simple.py
          echo "    description='libwally Bitcoin library'," >> setup_simple.py
          echo "    packages=['wallycore']," >> setup_simple.py
          echo "    package_dir={'wallycore': '.'}," >> setup_simple.py
          echo "    ext_modules=[wally_ext]," >> setup_simple.py
          echo "    zip_safe=False," >> setup_simple.py
          echo ")" >> setup_simple.py

          # Build the wheel
          python3 setup_simple.py bdist_wheel
          cp dist/*.whl ../../wheelhouse/
        env:
          WALLY_ABI_PY_WHEEL_VERSION: "1001"
          ARCHFLAGS: "-arch arm64"
          _PYTHON_HOST_PLATFORM: "macosx-11.0-arm64"

      - name: Build Wheels (Other platforms)
        if: matrix.os != 'self-hosted'
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_SKIP: "cp27-* cp35-* cp36-* cp37-* pp* *-musllinux*"
          CIBW_ARCHS_MACOS: "native"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y epel-release && \
            yum install -y automake autoconf libtool swig3 && \
            ln -sf /usr/bin/swig3.0 /usr/bin/swig || \
            ln -sf /usr/bin/swig3 /usr/bin/swig
          CIBW_BEFORE_ALL_MACOS: "brew install automake autoconf libtool swig || true"
          CIBW_ENVIRONMENT: "WALLY_ABI_PY_WHEEL_VERSION=1001"
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
