name: push check

on: 
  push:
    branches:
    - develop
    - feature/*
  pull_request:
    branches:
    - develop

jobs:
  cmake-js-build:
    timeout-minutes: 20
    name: cmake-js build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04]
        node: [18]

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true
    - name: setup-node
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node }}
    - name: npm_install
      run: npm install
    - name: test
      run: npm run ctest

  cmake-build:
    timeout-minutes: 20
    name: cmake build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        type: [msvc, apple-arm64, ubuntu-22.04]
        include:
          - type: msvc
            os: windows-2022
            generator: Visual Studio 17 2022
          - type: apple-arm64
            os: self-hosted
            generator: Unix Makefiles
            arch: arm64
          - type: ubuntu-22.04
            os: ubuntu-22.04
            generator: Unix Makefiles

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true
    - name: cmake-generate
      if: matrix.type != 'apple-arm64'
      run: |
        cmake -S . -B build -G "${{ matrix.generator }}" -DENABLE_SHARED=on -DENABLE_ELEMENTS=on -DCMAKE_BUILD_PARALLEL_LEVEL=2 -DGENERATE_WALLY=off -DTARGET_RPATH="./wrap_js/build/Release;\$\${ORIGIN}/;\${ORIGIN}/"
    - name: cmake-generate-mac-arch
      if: matrix.type == 'apple-arm64'
      run: |
        cmake -S . -B build -G "${{ matrix.generator }}" -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} -DENABLE_SHARED=on -DENABLE_ELEMENTS=on -DCMAKE_BUILD_PARALLEL_LEVEL=2 -DGENERATE_WALLY=off -DTARGET_RPATH="./wrap_js/build/Release;\$\${ORIGIN}/;\${ORIGIN}/"
    - name: cmake-build
      run: |
        cmake --version
        cmake --build build --config Release
    - name: test
      run: |
        cd build
        ctest -C Release --output-on-failure

  cmake-swig-build:
    timeout-minutes: 20
    name: cmake swig build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04]
        target: [python, java]
        java: [11.0.x, 17]
        exclude:
          - target: python
            java: 17

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true
    - name: setup python
      if: matrix.target == 'python'
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        architecture: x64
    - name: setup java
      if: matrix.target == 'java'
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java }}
        architecture: x64
        distribution: 'temurin'
    - name: ubuntu-install-swig
      run: sudo apt install swig
    - name: cmake-generate-python-config
      if: matrix.target == 'python'
      run: |
        cmake -S . -B build -G "Unix Makefiles" -DENABLE_SHARED=on -DENABLE_ELEMENTS=on -DCMAKE_BUILD_PARALLEL_LEVEL=2 -DENABLE_SWIG_PYTHON=on -DGENERATE_WALLY=off -DTARGET_RPATH="./wrap_js/build/Release;../"
    - name: cmake-generate-java-config
      if: matrix.target == 'java'
      run: |
        cmake -S . -B build -G "Unix Makefiles" -DENABLE_SHARED=on -DENABLE_ELEMENTS=on -DCMAKE_BUILD_PARALLEL_LEVEL=2 -DENABLE_SWIG_JAVA=on -DGENERATE_WALLY=off -DTARGET_RPATH="./wrap_js/build/Release;../"
    - name: cmake-build
      run: |
        cmake --version
        cmake --build build --config Release
    - name: test
      run: |
        cd build
        ctest -C Release --output-on-failure

  go-test:
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04]
        go-version: [1.21.x]

    steps:
    - name: setup go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}
    - uses: actions/checkout@v3
      with:
        submodules: true
    - name: cmake-generate
      run: |
        cmake -S . -B build -G "Unix Makefiles" -DENABLE_SHARED=on -DENABLE_TESTS=off -DENABLE_ELEMENTS=on -DTARGET_RPATH="/usr/local/lib;/usr/local/lib64;./build/Release"
    - name: cmake-build
      run: |
        cmake --version
        cmake --build build --config Release --parallel 2
        cp ./src/swig_go/*_test.go .
        go mod init github.com/cryptogarageinc/libwally-core
        go get github.com/stretchr/testify/assert
        go mod tidy
        go build
    - name: go_test
      run: |
        LD_LIBRARY_PATH=./build/Release go test
